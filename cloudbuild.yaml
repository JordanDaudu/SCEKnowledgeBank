# Cloud Build CI/CD pipeline for the Knowledge Bank.
#
# Triggered on push to `main`: first runs a typecheck gate (the whole build
# aborts if it fails, so nothing is built or deployed), then builds + pushes the
# three images, applies any new DB migrations (idempotent; seed is gated by a
# sentinel), and redeploys the API and web Cloud Run services with the new
# images. Existing service config (secrets, env vars, GCS volume) is preserved
# because each `gcloud run deploy` only changes --image.
#
# Manual run (same effect): gcloud builds submit . --config=cloudbuild.yaml
# Override the API URL baked into the web bundle:
#   --substitutions=_VITE_API_BASE=https://your-api-url

substitutions:
  _REGION: europe-west1
  _REPO: knowledge-bank
  # Empty so the web bundle uses relative /api paths — nginx reverse-proxies
  # them to the API (same-origin), which iOS requires. Do not set this to the
  # API origin or it reintroduces the cross-site cookie failure on iOS.
  _VITE_API_BASE: ""

timeout: 2400s
options:
  machineType: E2_HIGHCPU_8
  # Required when the build runs as a user-specified service account.
  logging: CLOUD_LOGGING_ONLY

steps:
  # ---- gate: typecheck before building or deploying anything ----
  # Same toolchain as the Dockerfiles (Node 24 + corepack/pnpm). The Prisma
  # client must be generated first because pnpm's onlyBuiltDependencies gate
  # skips it on install and the typecheck imports its generated types. If
  # `pnpm typecheck` exits non-zero this step fails and the whole build aborts,
  # so a commit that doesn't compile never reaches build/migrate/deploy.
  - name: node:24-alpine
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        corepack enable
        pnpm install --no-frozen-lockfile
        pnpm --filter @workspace/db run generate
        pnpm run typecheck

  # ---- build + push: API ----
  - name: gcr.io/cloud-builders/docker
    env: ['DOCKER_BUILDKIT=1']
    args: ['build', '-f', 'artifacts/api-server/Dockerfile', '--target=runtime',
            '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:latest', '.']
  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:latest']

  # ---- build + push: migrate job image ----
  - name: gcr.io/cloud-builders/docker
    env: ['DOCKER_BUILDKIT=1']
    args: ['build', '-f', 'artifacts/api-server/Dockerfile', '--target=migrate',
            '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api-migrate:latest', '.']
  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api-migrate:latest']

  # ---- build + push: web ----
  - name: gcr.io/cloud-builders/docker
    env: ['DOCKER_BUILDKIT=1']
    args: ['build', '-f', 'artifacts/web/Dockerfile',
            '--build-arg', 'VITE_API_BASE=${_VITE_API_BASE}',
            '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web:latest', '.']
  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web:latest']

  # ---- apply migrations (point the job at the new image, then run it) ----
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args: ['run', 'jobs', 'update', 'kb-migrate',
            '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api-migrate:latest',
            '--region=${_REGION}']
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args: ['run', 'jobs', 'execute', 'kb-migrate', '--region=${_REGION}', '--wait']

  # ---- deploy services (config preserved; only the image changes) ----
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args: ['run', 'deploy', 'kb-api',
            '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/api:latest',
            '--region=${_REGION}']
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args: ['run', 'deploy', 'kb-web',
            '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/web:latest',
            '--region=${_REGION}']
