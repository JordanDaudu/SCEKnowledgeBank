# Tiered CI for the feature -> dev -> stage -> main flow.
#
# Every PR/push to dev, stage, or main runs typecheck + unit/integration tests
# (against a real Postgres). The pre-release tiers (stage, main) additionally
# build all Docker images and run the Playwright e2e suite. Deployment is NOT
# done here -- cloudbuild.yaml still builds + deploys to Cloud Run on push to
# main via its Cloud Build trigger.
name: CI

on:
  pull_request:
    branches: [dev, stage, main]
  push:
    branches: [dev, stage, main]

# Cancel an in-progress run when a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Install + typecheck gate. Also computes `heavy` = true for the stage/main
  # tiers, which turns on the docker-build and e2e jobs.
  setup:
    runs-on: ubuntu-latest
    outputs:
      heavy: ${{ steps.tier.outputs.heavy }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      # Prisma client is generated explicitly: pnpm's onlyBuiltDependencies gate
      # skips it on install and the typecheck imports its generated types.
      - run: pnpm --filter @workspace/db run generate
      - run: pnpm run typecheck
      - id: tier
        shell: bash
        run: |
          target="${{ github.base_ref || github.ref_name }}"
          if [ "$target" = "stage" ] || [ "$target" = "main" ]; then
            echo "heavy=true" >> "$GITHUB_OUTPUT"
          else
            echo "heavy=false" >> "$GITHUB_OUTPUT"
          fi

  # Runs the full vitest suite. The api-server repository tests hit a real
  # Postgres via @workspace/db (Prisma) and use pg_trgm-backed FTS, so we stand
  # up Postgres, enable the extension, and apply migrations before testing.
  unit-tests:
    needs: setup
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: knowledge_bank
          POSTGRES_PASSWORD: knowledge_bank
          POSTGRES_DB: knowledge_bank
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U knowledge_bank"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://knowledge_bank:knowledge_bank@localhost:5432/knowledge_bank
      SESSION_SECRET: ci-session-secret
      SIGNED_URL_SECRET: ci-signed-url-secret
      STORAGE_DRIVER: local
      STORAGE_LOCAL_ROOT: /tmp/kb-storage
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @workspace/db run generate
      - run: mkdir -p /tmp/kb-storage
      # postgresql-client ships on the ubuntu-latest runner image.
      - name: Enable pg_trgm extension
        run: PGPASSWORD=knowledge_bank psql -h localhost -U knowledge_bank -d knowledge_bank -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
      - name: Apply migrations
        run: pnpm --filter @workspace/db run migrate
      - name: Run vitest (api-server + web)
        run: pnpm -r run test

  # Validates that all three images build (matching what Cloud Build does). No
  # push -- deployment stays with cloudbuild.yaml. Heavy tiers only.
  docker-build:
    needs: setup
    if: needs.setup.outputs.heavy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/api-server/Dockerfile
          target: runtime
          tags: kb-api:ci
          load: true
          cache-from: type=gha,scope=api-runtime
          cache-to: type=gha,mode=max,scope=api-runtime
      - name: Build api migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/api-server/Dockerfile
          target: migrate
          tags: kb-api-migrate:ci
          load: true
          cache-from: type=gha,scope=api-migrate
          cache-to: type=gha,mode=max,scope=api-migrate
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: artifacts/web/Dockerfile
          build-args: |
            VITE_API_BASE=
          tags: kb-web:ci
          load: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  # Brings up the real stack via docker-compose, seeds demo data, and runs the
  # Playwright smoke specs against it. Heavy tiers only.
  e2e:
    needs: setup
    if: needs.setup.outputs.heavy == 'true'
    runs-on: ubuntu-latest
    env:
      # docker-compose.yml requires these (it uses ${VAR:?} guards).
      SESSION_SECRET: ci-session-secret
      SIGNED_URL_SECRET: ci-signed-url-secret
      VITE_API_BASE: http://localhost:8080
      WEB_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @workspace/db run generate
      - run: mkdir -p /tmp/kb-storage
      # Builds + starts db, api, web (and their init deps); --wait blocks until
      # the healthchecks pass. The compose file maps db:5432, api:8080, web:5173.
      - name: Start stack
        run: docker compose up -d --build --wait db api web
      - name: Seed demo data
        env:
          DATABASE_URL: postgres://knowledge_bank:knowledge_bank@localhost:5432/knowledge_bank
          STORAGE_DRIVER: local
          STORAGE_LOCAL_ROOT: /tmp/kb-storage
        run: pnpm --filter @workspace/api-server run seed:demo
      - name: Install Playwright browser
        run: pnpm --filter @workspace/web exec playwright install --with-deps chromium
      - name: Run Playwright e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
        run: pnpm --filter @workspace/web run test:e2e
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            artifacts/web/test-results
            artifacts/web/playwright-report
          if-no-files-found: ignore
      - name: Dump compose logs
        if: failure()
        run: docker compose logs --no-color
      - name: Tear down
        if: always()
        run: docker compose down -v
