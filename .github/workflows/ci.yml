# PR quality gate: typecheck every pull request that targets `main` before it
# can be merged. This mirrors the typecheck step in cloudbuild.yaml, but runs
# *before* merge — so breakage is caught in the PR instead of after it lands on
# main and triggers a deploy. Same toolchain as the Dockerfiles (Node 24 +
# pnpm via corepack/packageManager), and the Prisma client is generated first
# because pnpm's onlyBuiltDependencies gate skips it on install.
name: CI

on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs pnpm using the version pinned in package.json's packageManager.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm --filter @workspace/db run generate

      - run: pnpm run typecheck
