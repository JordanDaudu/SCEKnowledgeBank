server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy the API so the browser only ever talks to THIS (web)
    # origin. Keeping everything same-origin makes the session cookie
    # first-party, which iOS Safari/WebKit requires — it blocks the
    # cross-site cookie when the API is served from a separate origin,
    # which broke all authenticated requests (document list, files) on
    # iPhone/iPad. The client uses relative /api paths (VITE_API_BASE="").
    location /api/ {
        proxy_pass https://kb-api-zaubgdpnyq-ew.a.run.app;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host kb-api-zaubgdpnyq-ew.a.run.app;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        # Stream file up/downloads through without buffering to disk, and
        # allow uploads up to the app's MAX_UPLOAD_MB (50) plus overhead.
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 60m;
    }

    # Cache hashed asset files aggressively; they have content-hashed names so
    # invalidation happens via filename change.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The service worker must be revalidated on every load so PWA updates
    # roll out promptly (a cached SW would pin users to an old app shell).
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback: every unknown path serves index.html so the client router
    # can take over. index.html itself must not be cached aggressively, or
    # users will see stale builds after a deploy.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Lightweight healthcheck endpoint for container probes.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
