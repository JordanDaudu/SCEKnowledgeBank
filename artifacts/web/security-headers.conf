# Security response headers, shared across every location.
#
# nginx does NOT inherit server-level `add_header` directives into a location
# that declares its own `add_header` (e.g. the Cache-Control on /assets/ and
# index.html). To guarantee these headers ship on every response — including
# the SPA's index.html, which is served via an internal redirect that re-matches
# `location = /index.html` — this snippet is `include`d in the server block AND
# re-included in each location that sets its own headers.
#
# `always` makes the header apply to error responses (4xx/5xx) too.

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# HSTS: enforce HTTPS for a year. Cloud Run terminates TLS in front of nginx
# and forwards the original scheme; the header passes straight through.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
# CSP is deliberately pragmatic, not locked-down: the app boots with two inline
# <script> blocks (theme + language, before first paint) and ships CSS-in-JS,
# so 'unsafe-inline' is required for script/style. Everything else is pinned to
# 'self' plus the Google Fonts origins the app preconnects to.
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src 'self'; worker-src 'self' blob:; frame-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests" always;
