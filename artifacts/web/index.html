<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>SCE Knowledge Bank — Course Materials &amp; Study Resources</title>
    <meta name="description" content="SCE Knowledge Bank is a shared library of course materials, lecture notes, exams, and study resources for SCE students and lecturers." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://kb-web-zaubgdpnyq-ew.a.run.app/" />
    <meta property="og:site_name" content="SCE Knowledge Bank" />
    <meta property="og:title" content="SCE Knowledge Bank" />
    <meta property="og:description" content="A shared library of course materials, lecture notes, exams, and study resources for SCE students and lecturers." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kb-web-zaubgdpnyq-ew.a.run.app/" />
    <meta property="og:image" content="https://kb-web-zaubgdpnyq-ew.a.run.app/opengraph.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SCE Knowledge Bank" />
    <meta name="twitter:description" content="A shared library of course materials, lecture notes, exams, and study resources for SCE students and lecturers." />
    <meta name="twitter:image" content="https://kb-web-zaubgdpnyq-ew.a.run.app/opengraph.jpg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- WebSite structured data so search engines can surface the app and
         enable a sitelinks search box. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "SCE Knowledge Bank",
        "url": "https://kb-web-zaubgdpnyq-ew.a.run.app/",
        "description": "A shared library of course materials, lecture notes, exams, and study resources for SCE students and lecturers."
      }
    </script>
    <style>
      /* Accessible skip link: visually hidden until it receives keyboard focus,
         then it pins to the top-left so keyboard users can jump past the nav. */
      .skip-link {
        position: absolute;
        left: -9999px;
        top: 0;
        z-index: 1000;
        padding: 0.5rem 1rem;
        background: #0f172a;
        color: #fff;
        border-radius: 0 0 0.375rem 0;
        text-decoration: none;
      }
      .skip-link:focus {
        left: 0;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=David+Libre:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Apply the saved/system theme before first paint so dark-mode users
      // don't see a white flash. Mirrors next-themes (storageKey "kb-theme",
      // class strategy). The provider takes over once React mounts.
      (function () {
        try {
          var t = localStorage.getItem("kb-theme");
          var dark =
            t === "dark" ||
            ((!t || t === "system") &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch {}
      })();
    </script>
    <script>
      // Apply the saved language's direction before first paint so RTL
      // (Hebrew) doesn't flash LTR. Mirrors the theme script; i18n
      // (i18next-browser-languagedetector, key "kb-lang") takes over on mount.
      (function () {
        try {
          var l = localStorage.getItem("kb-lang") || "";
          var he = l.indexOf("he") === 0;
          var el = document.documentElement;
          el.setAttribute("lang", he ? "he" : "en");
          el.setAttribute("dir", he ? "rtl" : "ltr");
        } catch {}
      })();
    </script>
  </head>
  <body>
    <a href="#main" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
