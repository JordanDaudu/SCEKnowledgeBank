openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Knowledge Bank API
servers:
  - url: /api
    description: Base API path

tags:
  - name: health
  - name: auth
  - name: documents
  - name: comments
  - name: requests
  - name: taxonomy
  - name: users
  - name: notifications
  - name: analytics
  - name: collections
  - name: prep-hub
  - name: moderation

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Public registration for student / lecturer accounts
      description: >-
        Admin self-registration is impossible: `role` is constrained to
        `student | lecturer`. Students are created `ACTIVE` and a
        session cookie is set in the response. Lecturers are created
        `PENDING_APPROVAL` and no session is established until an
        admin approves them.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RegisterResponse" }
        "400":
          description: Validation error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "409":
          description: Email already registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Status-aware login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurrentUser" }
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "403":
          description: Account disabled or pending admin approval
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: End the current session
      responses:
        "204": { description: Logged out }

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurrentUser" }
        "401":
          description: Not authenticated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /me/username-available:
    get:
      operationId: checkUsernameAvailability
      tags: [profile]
      summary: Check whether a username is available for the current user
      parameters:
        - { in: query, name: username, required: true, schema: { type: string } }
      responses:
        "200":
          description: Availability
          content:
            application/json:
              schema:
                type: object
                required: [available]
                properties:
                  available: { type: boolean }
                  reason: { type: string, enum: [invalid, reserved, taken] }
  /me/profile:
    patch:
      operationId: updateMyProfile
      tags: [profile]
      summary: Update the current user's editable profile fields (username)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username: { type: string }
      responses:
        "200":
          description: Updated current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurrentUser" }
  /me/avatar:
    put:
      operationId: uploadMyAvatar
      tags: [profile]
      summary: Upload or replace the current user's avatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "200":
          description: Updated current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurrentUser" }
    delete:
      operationId: removeMyAvatar
      tags: [profile]
      summary: Remove the current user's avatar
      responses:
        "200":
          description: Updated current user
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CurrentUser" }

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents with filters, sort, pagination (use /v2/documents/search for full-text)
      parameters:
        - { in: query, name: courseId, schema: { type: string, format: uuid } }
        - { in: query, name: courseCode, schema: { type: string } }
        - { in: query, name: lecturerName, schema: { type: string } }
        - { in: query, name: semester, schema: { type: string, enum: [fall, spring, summer] } }
        - { in: query, name: academicYear, schema: { type: integer } }
        - { in: query, name: materialType, schema: { type: string } }
        - { in: query, name: categoryId, schema: { type: string, format: uuid } }
        - in: query
          name: tagIds
          style: form
          explode: true
          schema: { type: array, items: { type: string, format: uuid } }
        - { in: query, name: dateFrom, schema: { type: string, format: date } }
        - { in: query, name: dateTo, schema: { type: string, format: date } }
        - { in: query, name: sort, schema: { type: string, enum: [newest, oldest, title, popularity, relevance, recent, viewed, downloaded, favorited, trending], default: newest } }
        - { in: query, name: page, schema: { type: integer, minimum: 1, default: 1 } }
        - { in: query, name: pageSize, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        "200":
          description: Page of documents
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentPage" }

  /storage/quota/me:
    get:
      operationId: getMyStorageQuota
      tags: [storage]
      summary: Storage usage and quota for the authenticated user
      responses:
        "200":
          description: Quota snapshot
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StorageQuota" }

  /documents/upload:
    post:
      operationId: uploadDocuments
      tags: [documents]
      summary: Upload one or more documents (multipart). Each file becomes its own Document.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items: { type: string, format: binary }
                courseId: { type: string, format: uuid }
                categoryId: { type: string, format: uuid }
                materialType: { type: string }
                semester: { type: string, enum: [fall, spring, summer] }
                academicYear: { type: integer }
                visibility: { type: string, enum: [public, restricted, private] }
                tagIds:
                  type: array
                  items: { type: string, format: uuid }
                # Optional title override; otherwise derived from filename
                title: { type: string }
                description: { type: string }
                # Sprint-3 M2: when "draft", the doc lands in `draft`
                # and the uploader can submit it for review. Default
                # is `published` (legacy upload-and-publish). Students
                # are always forced to `draft` regardless of input.
                status: { type: string, enum: [draft, published] }
                # Sprint-3 completion: when true, every successfully
                # uploaded doc is immediately routed through
                # `submitForReview` (audited + uploader notified on
                # approve/reject). Used by the student UI default.
                autoSubmitForReview: { type: boolean }
      responses:
        "201":
          description: Per-file results (partial success possible)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadResult" }

  /documents/recent:
    get:
      operationId: listRecentDocuments
      tags: [documents]
      summary: The current user's recently viewed documents
      parameters:
        - { in: query, name: limit, schema: { type: integer, minimum: 1, maximum: 20, default: 6 } }
      responses:
        "200":
          description: Recent documents
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Document" }

  # ─── v2 search surface (Sprint-3 M3, only search surface as of M7) ─
  # The legacy `/documents/suggestions` endpoint and the `q` parameter
  # on `/documents` were retired in M7 — these v2 paths are the only
  # full-text / autocomplete entry points.
  /v2/documents/search:
    get:
      operationId: searchDocumentsV2
      tags: [documents]
      summary: Rank-aware document search with snippet highlighting
      parameters:
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: courseId, schema: { type: string, format: uuid } }
        - { in: query, name: courseCode, schema: { type: string } }
        - { in: query, name: lecturerName, schema: { type: string } }
        - { in: query, name: semester, schema: { type: string, enum: [fall, spring, summer] } }
        - { in: query, name: academicYear, schema: { type: integer } }
        - { in: query, name: materialType, schema: { type: string } }
        - { in: query, name: categoryId, schema: { type: string, format: uuid } }
        - in: query
          name: tagIds
          style: form
          explode: true
          schema: { type: array, items: { type: string, format: uuid } }
        - { in: query, name: uploaderId, schema: { type: string, format: uuid } }
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: dateFrom, schema: { type: string, format: date } }
        - { in: query, name: dateTo, schema: { type: string, format: date } }
        - { in: query, name: sort, schema: { type: string, enum: [newest, oldest, title, popularity, relevance, recent, viewed, downloaded, favorited, trending], default: newest } }
        - { in: query, name: page, schema: { type: integer, minimum: 1, default: 1 } }
        - { in: query, name: pageSize, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        "200":
          description: Page of ranked search hits
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchPage" }

  /v2/documents/search/facets:
    get:
      operationId: searchDocumentsFacets
      tags: [documents]
      summary: Facet counts for the current search filters
      parameters:
        - { in: query, name: q, schema: { type: string } }
        - { in: query, name: courseId, schema: { type: string, format: uuid } }
        - { in: query, name: courseCode, schema: { type: string } }
        - { in: query, name: lecturerName, schema: { type: string } }
        - { in: query, name: semester, schema: { type: string, enum: [fall, spring, summer] } }
        - { in: query, name: academicYear, schema: { type: integer } }
        - { in: query, name: materialType, schema: { type: string } }
        - { in: query, name: categoryId, schema: { type: string, format: uuid } }
        - in: query
          name: tagIds
          style: form
          explode: true
          schema: { type: array, items: { type: string, format: uuid } }
        - { in: query, name: uploaderId, schema: { type: string, format: uuid } }
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: dateFrom, schema: { type: string, format: date } }
        - { in: query, name: dateTo, schema: { type: string, format: date } }
      responses:
        "200":
          description: Per-dimension facet counts
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchFacets" }

  # ─── Sprint-3 M4: smart-metadata helpers ─────────────────────────
  /v2/documents/duplicate-check:
    get:
      operationId: checkDuplicateDocument
      tags: [documents]
      summary: Look up an existing visible document with the same sha256 checksum.
      parameters:
        - in: query
          name: checksum
          required: true
          schema: { type: string, pattern: "^[a-fA-F0-9]{64}$" }
      responses:
        "200":
          description: Duplicate (or null when none visible to the caller).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DuplicateCheckResponse" }

  /v2/documents/suggest-metadata:
    post:
      operationId: suggestDocumentMetadata
      tags: [documents]
      summary: >-
        Run extractor + intelligence on a single file and return
        suggested title, tags, category, language, keywords plus a
        duplicate banner if applicable. Does NOT persist anything.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "200":
          description: Suggestion bundle for the upload form.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SuggestMetadataResponse" }

  /v2/documents/autocomplete:
    get:
      operationId: searchAutocomplete
      tags: [documents]
      summary: Tag / course / uploader autocomplete for the search bar
      parameters:
        - { in: query, name: q, required: true, schema: { type: string, minLength: 1 } }
        - { in: query, name: limit, schema: { type: integer, minimum: 1, maximum: 20, default: 5 } }
      responses:
        "200":
          description: Grouped autocomplete hits
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchAutocomplete" }

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentDetail" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
    patch:
      operationId: updateDocument
      tags: [documents]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateDocumentRequest" }
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentDetail" }
    delete:
      operationId: deleteDocument
      tags: [documents]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Deleted }

  /documents/bulk:
    post:
      operationId: bulkDocumentAction
      tags: [documents]
      summary: Apply a bulk action to multiple documents
      description: >-
        Run delete / add-tag / assign-category across a set of documents.
        Each id is processed through the same audited single-document
        path; a per-id result list reports partial success.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BulkDocumentActionRequest" }
      responses:
        "200":
          description: Per-document results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkDocumentActionResult" }
        "400": { description: Invalid request, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "401": { description: Not authenticated, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }

  /documents/{id}/thumbnail:
    get:
      operationId: getDocumentThumbnail
      tags: [documents]
      summary: Stream a server-generated thumbnail (signed-URL pathway)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: token, required: true, schema: { type: string } }
      responses:
        "200":
          description: Thumbnail bytes
          content:
            image/jpeg:
              schema: { type: string, format: binary }
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "404":
          description: No thumbnail for this document
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /documents/{id}/preview-token:
    get:
      operationId: getDocumentPreviewToken
      tags: [documents]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Signed token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SignedTokenResponse" }

  /documents/{id}/download-token:
    get:
      operationId: getDocumentDownloadToken
      tags: [documents]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Signed token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SignedTokenResponse" }

  /documents/{id}/preview:
    get:
      operationId: previewDocument
      tags: [documents]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: token, required: true, schema: { type: string } }
      responses:
        "200":
          description: File stream
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /documents/{id}/download:
    get:
      operationId: downloadDocument
      tags: [documents]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: query, name: token, required: true, schema: { type: string } }
        # Optional: download a specific historical version (US-5). When
        # omitted, the latest version is served. The server validates
        # that `versionId` belongs to `id`.
        - { in: query, name: versionId, required: false, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: File stream
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /documents/{id}/versions:
    get:
      operationId: listDocumentVersions
      tags: [documents]
      summary: Linear version history for a document (newest first)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Versions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DocumentVersion" }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
    post:
      operationId: uploadDocumentVersion
      tags: [documents]
      summary: Upload a new version of an existing document (US-5)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                changeNote: { type: string, maxLength: 500 }
      responses:
        "201":
          description: The new version
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentVersion" }
        "400": { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }

  /documents/{id}/versions/{versionId}/restore:
    post:
      operationId: restoreDocumentVersion
      tags: [documents]
      summary: Make an older version the current one (preserves history)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: versionId, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: The new version that promoted the old one
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentVersion" }
        "400": { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }

  /documents/{id}/versions/{versionId}:
    delete:
      operationId: deleteDocumentVersion
      tags: [documents]
      summary: Delete an older version (the current version cannot be deleted)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: versionId, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Deleted }
        "400": { description: Bad request (e.g. current version), content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }

  /documents/{id}/comments:
    get:
      operationId: listDocumentComments
      tags: [comments]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Comments
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Comment" }
    post:
      operationId: createDocumentComment
      tags: [comments]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateCommentRequest" }
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }

  /comments/{commentId}:
    patch:
      operationId: updateComment
      tags: [comments]
      parameters:
        - { in: path, name: commentId, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateCommentRequest" }
      responses:
        "200":
          description: Updated comment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Comment" }
    delete:
      operationId: deleteComment
      tags: [comments]
      parameters:
        - { in: path, name: commentId, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Deleted }

  /comments/{commentId}/reactions/{kind}:
    post:
      operationId: addCommentReaction
      tags: [comments]
      parameters:
        - { in: path, name: commentId, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: kind, required: true, schema: { type: string, enum: [like, love, insightful, celebrate, thanks, question] } }
      responses:
        "200":
          description: Updated reaction summary for this comment
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CommentReaction" }
        "400": { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
    delete:
      operationId: removeCommentReaction
      tags: [comments]
      parameters:
        - { in: path, name: commentId, required: true, schema: { type: string, format: uuid } }
        - { in: path, name: kind, required: true, schema: { type: string, enum: [like, love, insightful, celebrate, thanks, question] } }
      responses:
        "200":
          description: Updated reaction summary for this comment
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CommentReaction" }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }

  /documents/{id}/favorite:
    post:
