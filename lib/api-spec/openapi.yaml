      responses:
        "200":
          description: Updated comment
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyCollectionComment" }
    delete:
      operationId: deleteCollectionComment
      tags: [prep-hub]
      summary: Delete a collection comment
      responses:
        "204": { description: Deleted }
  /admin/collections/moderation:
    get:
      operationId: listCollectionModeration
      tags: [moderation]
      summary: Admin — list all public collections with moderation stats
      parameters:
        - { in: query, name: limit, required: false, schema: { type: integer } }
      responses:
        "200":
          description: Moderation list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CollectionModerationList" }
  /admin/collections/{id}/hide:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
    post:
      operationId: hideCollection
      tags: [moderation]
      summary: Admin — hide a collection from the Prep Hub
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Updated collection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyCollectionDetail" }
  /admin/collections/{id}/unhide:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
    post:
      operationId: unhideCollection
      tags: [moderation]
      summary: Admin — unhide a previously hidden collection
      responses:
        "200":
          description: Updated collection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyCollectionDetail" }
  /admin/collections/comments/{commentId}:
    parameters:
      - { in: path, name: commentId, required: true, schema: { type: string, format: uuid } }
    delete:
      operationId: removeCollectionComment
      tags: [moderation]
      summary: Admin — delete a collection comment
      responses:
        "204": { description: Deleted }
  /documents/{id}/progress:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
    put:
      operationId: setDocumentProgress
      tags: [collections]
      summary: Set the current user's study progress on a document
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetProgressRequest" }
      responses:
        "200":
          description: Progress
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StudyProgressResponse" }
  /me/continue-studying:
    get:
      operationId: listContinueStudying
      tags: [collections]
      summary: Documents the current user is currently reviewing
      responses:
        "200":
          description: Documents
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Document" } }
  /me/recommendations:
    get:
      operationId: listRecommendations
      tags: [collections]
      summary: Recommended documents for the current user (Phase 2 ranking)
      responses:
        "200":
          description: Documents
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Document" } }
components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: {}

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, minLength: 1 }
        password: { type: string, minLength: 1 }

    CurrentUser:
      type: object
      required: [id, email, displayName, username, avatarUrl, createdAt, roles, primaryRole, enrollments]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        username: { type: string, nullable: true }
        avatarUrl: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        primaryRole: { type: string }
        roles:
          type: array
          items: { type: string }
        # Sprint-3 completion: course enrollments are surfaced on
        # /auth/me so the web client can filter the upload course
        # picker for students (enrolled-only) without a second
        # round-trip. `roleInCourse` is "student" or "lecturer".
        enrollments:
          type: array
          items:
            type: object
            required: [courseId, roleInCourse]
            properties:
              courseId: { type: string, format: uuid }
              roleInCourse: { type: string }

    UserSummary:
      type: object
      required: [id, email, displayName, roles, isActive, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        displayName: { type: string }
        roles:
          type: array
          items: { type: string }
        isActive: { type: boolean }
        status:
          type: string
          enum: [ACTIVE, PENDING_APPROVAL, DISABLED]
        createdAt: { type: string, format: date-time }

    RegisterRequest:
      type: object
      required: [fullName, email, password, confirmPassword, role]
      properties:
        fullName: { type: string, minLength: 1, maxLength: 120 }
        email: { type: string, minLength: 1, maxLength: 254 }
        password: { type: string, minLength: 8, maxLength: 200 }
        confirmPassword: { type: string, minLength: 8, maxLength: 200 }
        role:
          type: string
          enum: [student, lecturer]
        studentId: { type: string, maxLength: 64 }
        lecturerId: { type: string, maxLength: 64 }
        department: { type: string, maxLength: 120 }
        enrolledCourseIds:
          type: array
          items: { type: string, format: uuid }
        teachingCourseIds:
          type: array
          items: { type: string, format: uuid }

    RegisterResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [ACTIVE, PENDING_APPROVAL]
        message: { type: string }
        user:
          oneOf:
            - { $ref: "#/components/schemas/CurrentUser" }
            - { type: "null" }
          description: >-
            Present (and the session cookie is set) when the user was
            auto-logged-in. Null for lecturers awaiting admin approval.

    Course:
      type: object
      required: [id, code, title, lecturerName]
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        title: { type: string }
        lecturerName: { type: string }

    Category:
      type: object
      required: [id, name, slug]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        description: { type: string }

    Tag:
      type: object
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }

    Document:
      type: object
      required:
        - id
        - title
        - description
        - materialType
        - visibility
        - status
        - uploader
        - createdAt
        - updatedAt
        - viewCount
        - downloadCount
        - favoriteCount
        - commentCount
        - currentVersion
        - tags
        - permissions
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        course: { $ref: "#/components/schemas/Course" }
        category: { $ref: "#/components/schemas/Category" }
        materialType: { type: string }
        semester: { type: string, enum: [fall, spring, summer] }
        academicYear: { type: integer }
        visibility: { type: string, enum: [public, restricted, private] }
        status:
          type: string
          enum: [draft, published, archived, pending_review, approved, rejected]
          description: >-
            Lifecycle status. `draft|published|archived` are the
            legacy values; `pending_review|approved|rejected` come
            from the Sprint-3 review workflow.
        uploader: { $ref: "#/components/schemas/UserSummary" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        viewCount: { type: integer }
        downloadCount: { type: integer }
        favoriteCount: { type: integer }
        commentCount: { type: integer }
        currentVersion: { type: integer }
        tags:
          type: array
          items: { $ref: "#/components/schemas/Tag" }
        file: { $ref: "#/components/schemas/DocumentFileMeta" }
        thumbnailUrl:
          type: string
          description: >-
            Signed URL to a server-generated thumbnail when one exists.
            Issued by `assembleDocuments` after visibility checks; goes
            through the same signed-URL pathway as preview/download.
        fallbackIconType:
          type: string
          enum: [pdf, image, doc, slides, sheet, text, archive, unknown]
          description: >-
            Generic icon bucket the client renders when no thumbnail is
            available. Derived from the latest file's MIME type.
        permissions:
          $ref: "#/components/schemas/DocumentPermissions"
        submittedForReviewAt:
          type: string
          format: date-time
          description: When the doc was most recently submitted for review.
        reviewedAt:
          type: string
          format: date-time
          description: When the doc was last approved or rejected.
        reviewer:
          $ref: "#/components/schemas/UserSummary"
        reviewReason:
          type: string
          description: >-
            Rejection rationale. Present only when status='rejected'.
            Cleared on the next submit-for-review.
        isFavorited:
          type: boolean
          description: >-
            True when the requesting user has favorited this document
            (Sprint-3 M6). Populated on detail responses and the
            `/me/favorites` list; may be absent on bulk list endpoints.

    DocumentPermissions:
      type: object
      description: >-
        Server-computed permission flags for the requesting user
        against this document. The frontend MUST use these flags
        (rather than role/uploader heuristics) to gate UI affordances
        — they encode the same course-aware logic the API enforces on
        write paths.
      required:
        - canView
        - canEdit
        - canDelete
        - canDownload
        - canComment
        - canSubmitForReview
        - canReview
      properties:
        canView: { type: boolean }
        canEdit: { type: boolean }
        canDelete: { type: boolean }
        canDownload: { type: boolean }
        canComment: { type: boolean }
        canSubmitForReview:
          type: boolean
          description: >-
            True when the user can move this doc into `pending_review`
            (status is currently `draft` or `rejected`, and they are
            the uploader/owner or can edit).
        canReview:
          type: boolean
          description: >-
            True when the user can approve/reject this doc (status is
            currently `pending_review`, and they are an admin or a
            lecturer for the doc's course).

    DocumentDetail:
      allOf:
        - $ref: "#/components/schemas/Document"

    DocumentFileMeta:
      type: object
      required: [id, originalFilename, displayFilename, mimeType, sizeBytes, uploadedAt]
      properties:
        id: { type: string, format: uuid }
        originalFilename:
          type: string
          description: The exact filename as the user uploaded it.
        displayFilename:
          type: string
          description: The filename shown in lists; if the uploader already had a file with the same name it will be suffixed e.g. "notes (2).pdf". Use this for the rename notice.
        mimeType: { type: string }
        sizeBytes: { type: integer }
        uploadedAt: { type: string, format: date-time }
        checksum: { type: string }
        extractedMetadata:
          $ref: "#/components/schemas/ExtractedFileMetadata"

    ExtractedFileMetadata:
      type: object
      required: [hasExtractedText]
      description: >-
        Server-side metadata pulled from the uploaded file on ingest
        (task #27). Every field is optional — extraction may fail
        per-file without failing the upload.
      properties:
        pageCount: { type: integer, minimum: 0 }
        detectedTitle: { type: string }
        author: { type: string }
        imageWidth: { type: integer, minimum: 0 }
        imageHeight: { type: integer, minimum: 0 }
        hasExtractedText:
          type: boolean
          description: True when extracted text exists for full-text search (task #28).
        language:
          type: string
          description: >-
            ISO-639-1 short code (en/es/fr/de/it/pt) detected from the
            extracted text. Omitted when the classifier could not reach
            its confidence threshold (Sprint-3 M4).
        keywords:
          type: array
          items: { type: string }
          description: >-
            Top content terms by frequency after stopword filtering,
            most frequent first. Empty/omitted when extraction had no
            usable text (Sprint-3 M4).

    DuplicateCheckResponse:
      type: object
      required: [duplicate]
      properties:
        duplicate:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/DuplicateDocument"

    DuplicateDocument:
      type: object
      required: [documentId, title, uploaderDisplayName, uploadedAt]
      properties:
        documentId: { type: string, format: uuid }
        title: { type: string }
        uploaderDisplayName: { type: string }
        uploadedAt: { type: string, format: date-time }

    SuggestMetadataResponse:
      type: object
      required: [keywords, tags]
      properties:
        title: { type: string }
        titleSource: { type: string, enum: [metadata, filename] }
        language: { type: string }
        keywords:
          type: array
          items: { type: string }
        tags:
          type: array
          items:
            type: object
            required: [id, name]
            properties:
              id: { type: string, format: uuid }
              name: { type: string }
        category:
          type: object
          required: [id, name]
          properties:
            id: { type: string, format: uuid }
            name: { type: string }
        duplicate:
          $ref: "#/components/schemas/DuplicateDocument"
        materialType: { type: string }
        materialTypeSource: { type: string, enum: [filename] }
        semester: { type: string, enum: [fall, spring, summer] }
        academicYear: { type: integer }
        course:
          type: object
          required: [id, code, title]
          properties:
            id: { type: string, format: uuid }
            code: { type: string }
            title: { type: string }
        courseConfidence: { type: string, enum: [high, low] }

    DocumentPage:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Document" }
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }

    SearchHit:
      allOf:
        - $ref: "#/components/schemas/Document"
        - type: object
          properties:
            headline:
              type: string
              description: >-
                Snippet from `ts_headline` with sentinel markers
                `[[KBMARK]]…[[/KBMARK]]` around matches. Clients MUST
                HTML-escape the string before swapping the sentinels
                for `<mark>` tags — the underlying haystack may
                contain user-supplied characters that are unsafe to
                render as raw HTML.

    SearchPage:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/SearchHit" }
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }

    SearchFacetCourse:
      type: object
      required: [id, code, title, count]
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        title: { type: string }
        count: { type: integer }

    SearchFacetValue:
      type: object
      required: [value, count]
      properties:
        value: { type: string }
        count: { type: integer }

    SearchFacetUploader:
      type: object
      required: [id, displayName, count]
      properties:
        id: { type: string, format: uuid }
        displayName: { type: string }
        count: { type: integer }

    SearchFacets:
      type: object
      required: [course, materialType, semester, status, uploader]
      properties:
        course:
          type: array
          items: { $ref: "#/components/schemas/SearchFacetCourse" }
        materialType:
          type: array
          items: { $ref: "#/components/schemas/SearchFacetValue" }
        semester:
          type: array
          items: { $ref: "#/components/schemas/SearchFacetValue" }
        status:
          type: array
          items: { $ref: "#/components/schemas/SearchFacetValue" }
        uploader:
          type: array
          items: { $ref: "#/components/schemas/SearchFacetUploader" }

    AutocompleteTagHit:
      type: object
      required: [id, name, count]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        count: { type: integer }

    AutocompleteCourseHit:
      type: object
      required: [id, code, title, count]
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        title: { type: string }
        count: { type: integer }

    AutocompleteUploaderHit:
      type: object
      required: [id, displayName, count]
      properties:
        id: { type: string, format: uuid }
        displayName: { type: string }
        count: { type: integer }

    SearchAutocomplete:
      type: object
      required: [tags, courses, uploaders]
      properties:
        tags:
          type: array
          items: { $ref: "#/components/schemas/AutocompleteTagHit" }
        courses:
          type: array
          items: { $ref: "#/components/schemas/AutocompleteCourseHit" }
        uploaders:
          type: array
          items: { $ref: "#/components/schemas/AutocompleteUploaderHit" }

    UpdateDocumentRequest:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        courseId: { type: string, format: uuid }
        categoryId: { type: string, format: uuid }
        materialType: { type: string }
        semester: { type: string, enum: [fall, spring, summer] }
        academicYear: { type: integer }
        visibility: { type: string, enum: [public, restricted, private] }
        status: { type: string, enum: [draft, published, archived] }
        tagIds:
          type: array
          items: { type: string, format: uuid }

    RejectDocumentRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 500
          description: >-
            Rejection rationale. Trimmed; must be non-empty and ≤500
            chars. Stored on the doc and pushed to the uploader as the
            notification body.

    UploadResult:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items: { $ref: "#/components/schemas/UploadFileResult" }

    UploadFileResult:
      type: object
      required: [originalFilename, success]
      properties:
        originalFilename: { type: string }
        success: { type: boolean }
        document: { $ref: "#/components/schemas/Document" }
        error: { type: string }
        errorCode:
          type: string
          description: >-
            Machine-readable failure reason. Known values:
            `disallowed_mime`, `mime_mismatch`, `storage_quota_exceeded`,
            `duplicate_file`, `upload_failed`.
        duplicateOfDocumentId:
          type: string
          format: uuid
          description: >-
            Set when `errorCode === "duplicate_file"` — id of the existing
            document this upload matched by SHA-256.
        duplicateOfTitle:
          type: string
          description: >-
            Set when `errorCode === "duplicate_file"` — title of the
            existing document this upload matched by SHA-256.

    StorageQuota:
      type: object
      required: [usedBytes, quotaBytes, remainingBytes]
      properties:
        usedBytes:
          type: integer
          format: int64
          description: Bytes currently used by this user.
        quotaBytes:
          type: integer
          format: int64
          description: Effective quota in bytes (per-user override or server default).
        remainingBytes:
          type: integer
          format: int64
          description: Non-negative remainder; clamped to zero when usedBytes exceeds quotaBytes.

    DocumentVersion:
      type: object
      required:
        [
          id,
          documentId,
          versionNumber,
          originalFilename,
          mimeType,
          sizeBytes,
          checksum,
          uploadedAt,
          isCurrent,
        ]
      properties:
        id: { type: string, format: uuid }
        documentId: { type: string, format: uuid }
        versionNumber: { type: integer, minimum: 1 }
        originalFilename: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer, format: int64 }
        checksum: { type: string, description: "SHA-256 hex" }
        changeNote: { type: string, nullable: true }
        uploadedAt: { type: string, format: date-time }
        uploader:
          allOf: [{ $ref: "#/components/schemas/UserSummary" }]
          nullable: true
        isCurrent:
          type: boolean
          description: True for the row whose versionNumber is highest.

    SignedTokenResponse:
      type: object
      required: [token, expiresAt, url]
      properties:
        token: { type: string }
        expiresAt: { type: string, format: date-time }
        url: { type: string, description: "Fully-qualified URL with token already attached" }

    Comment:
      type: object
      required: [id, documentId, body, author, createdAt, replies, mentions, reactions]
      properties:
        id: { type: string, format: uuid }
        documentId: { type: string, format: uuid }
        parentId: { type: string, format: uuid }
        body: { type: string }
        pageNumber: { type: integer }
        author: { $ref: "#/components/schemas/UserSummary" }
        createdAt: { type: string, format: date-time }
        editedAt: { type: string, format: date-time }
        replies:
          type: array
          items: { $ref: "#/components/schemas/Comment" }
        mentions:
          type: array
          description: >-
            Users mentioned in the comment body via `@displayName` or
            `@[uuid]` tokens. Unresolved tokens are silently dropped on
            write — they remain plain text in `body` but produce no
            entry here.
          items: { $ref: "#/components/schemas/UserSummary" }
        reactions:
          type: array
          description: >-
            Per-kind reaction summary. Empty list when no one has
            reacted. `viewerReacted` is true when the requesting user
            has the reaction of that kind on this comment.
          items: { $ref: "#/components/schemas/CommentReaction" }

    CommentReaction:
      type: object
      required: [kind, count, viewerReacted]
      properties:
        kind: { type: string, enum: [like, love, insightful, celebrate, thanks, question] }
        count: { type: integer, minimum: 0 }
        viewerReacted: { type: boolean }

    FavoriteStatus:
      type: object
      required: [favorited]
      properties:
        favorited: { type: boolean }

    CreateCommentRequest:
      type: object
      required: [body]
      properties:
        body: { type: string, minLength: 1 }
        parentId: { type: string, format: uuid }
        pageNumber: { type: integer, minimum: 1 }

    UpdateCommentRequest:
      type: object
      properties:
        body: { type: string, minLength: 1 }
        pageNumber: { type: integer, minimum: 1, nullable: true }

    MaterialRequest:
      type: object
      required: [id, title, description, status, requestedBy, voteCount, hasVoted, createdAt]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        status: { type: string, enum: [open, in_progress, fulfilled, closed] }
        course: { $ref: "#/components/schemas/Course" }
        requestedBy: { $ref: "#/components/schemas/UserSummary" }
        voteCount: { type: integer }
        hasVoted: { type: boolean }
        fulfillingDocumentId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }

    CreateRequestRequest:
      type: object
      required: [title, description]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        courseId: { type: string, format: uuid }

    UpdateRequestRequest:
      type: object
      properties:
        status: { type: string, enum: [open, in_progress, fulfilled, closed] }
        fulfillingDocumentId: { type: string, format: uuid, nullable: true }
        title: { type: string }
        description: { type: string }

    Notification:
      type: object
      required: [id, type, subjectType, subjectId, body, readAt, createdAt, actor, url]
      properties:
        id: { type: string, format: uuid }
        type: { type: string, description: "Producer-defined kind, e.g. comment.mention, comment.reply" }
        subjectType: { type: string }
        subjectId: { type: string }
        body: { type: string }
        url: { type: string, nullable: true }
        readAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        actor:
          nullable: true
          allOf: [{ $ref: "#/components/schemas/UserSummary" }]

    NotificationUnreadCount:
      type: object
      required: [unread]
      properties:
        unread: { type: integer, minimum: 0 }

    NotificationMarkAllResponse:
      type: object
      required: [updated]
      properties:
        updated: { type: integer, minimum: 0 }


    AnalyticsTopDocument:
      type: object
      required: [documentId, title, courseCode, count]
      properties:
        documentId: { type: string, format: uuid }
        title: { type: string }
        courseCode: { type: string, nullable: true }
        count: { type: integer, minimum: 0 }

    AnalyticsActiveUploader:
      type: object
      required: [userId, displayName, uploadCount]
      properties:
        userId: { type: string, format: uuid }
        displayName: { type: string }
        uploadCount: { type: integer, minimum: 0 }

    AnalyticsDailyCount:
      type: object
      required: [day, count]
      properties:
        day: { type: string, description: "YYYY-MM-DD" }
        count: { type: integer, minimum: 0 }

    AnalyticsOverviewTotals:
      type: object
      required:
        - totalDocuments
        - totalUsers
        - totalComments
        - pendingReviewCount
        - viewsThisWeek
        - viewsPriorWeek
        - downloadsThisWeek
        - downloadsPriorWeek
        - uploadsThisWeek
      properties:
        totalDocuments:      { type: integer, minimum: 0 }
        totalUsers:          { type: integer, minimum: 0 }
        totalComments:       { type: integer, minimum: 0 }
        pendingReviewCount:  { type: integer, minimum: 0 }
        viewsThisWeek:       { type: integer, minimum: 0 }
        viewsPriorWeek:      { type: integer, minimum: 0 }
        downloadsThisWeek:   { type: integer, minimum: 0 }
        downloadsPriorWeek:  { type: integer, minimum: 0 }
        uploadsThisWeek:     { type: integer, minimum: 0 }

    AnalyticsCourseTotals:
      type: object
      required:
        - totalDocuments
        - pendingReviewCount
        - totalComments
        - viewsThisWeek
        - viewsPriorWeek
        - downloadsThisWeek
        - downloadsPriorWeek
        - uploadsThisWeek
      properties:
        totalDocuments:      { type: integer, minimum: 0 }
        pendingReviewCount:  { type: integer, minimum: 0 }
        totalComments:       { type: integer, minimum: 0 }
        viewsThisWeek:       { type: integer, minimum: 0 }
        viewsPriorWeek:      { type: integer, minimum: 0 }
        downloadsThisWeek:   { type: integer, minimum: 0 }
        downloadsPriorWeek:  { type: integer, minimum: 0 }
        uploadsThisWeek:     { type: integer, minimum: 0 }

    AdminAnalyticsOverview:
      type: object
      required:
        - totals
        - topDocumentsByViews
        - topDocumentsByDownloads
        - activeUploaders
        - uploadsLast14Days
        - topCategories
        - duplicateGroups
        - generatedAt
      properties:
        totals: { $ref: "#/components/schemas/AnalyticsOverviewTotals" }
        topDocumentsByViews:
          type: array
          items: { $ref: "#/components/schemas/AnalyticsTopDocument" }
        topDocumentsByDownloads:
          type: array
          items: { $ref: "#/components/schemas/AnalyticsTopDocument" }
        activeUploaders:
          type: array
          items: { $ref: "#/components/schemas/AnalyticsActiveUploader" }
        uploadsLast14Days:
          type: array
          items: { $ref: "#/components/schemas/AnalyticsDailyCount" }
        topCategories:
          type: array
          items: { $ref: "#/components/schemas/AnalyticsTopCategory" }
        duplicateGroups:
          type: array
          items: { $ref: "#/components/schemas/AnalyticsDuplicateGroup" }
        generatedAt: { type: string, format: date-time }

    AnalyticsTopCategory:
      type: object
      required: [categoryId, name, documentCount]
      properties:
        categoryId: { type: string, format: uuid }
        name: { type: string }
        documentCount: { type: integer }

    AnalyticsDuplicateGroup:
      type: object
      required: [checksum, count, sampleTitle, sampleDocumentId]
      properties:
        checksum: { type: string }
        count: { type: integer }
        sampleTitle: { type: string }
        sampleDocumentId: { type: string, format: uuid }

    BulkDocumentActionRequest:
      type: object
      required: [action, ids]
      properties:
        action: { type: string, enum: [delete, add_tag, assign_category] }
        ids:
          type: array
          minItems: 1
          maxItems: 100
          items: { type: string, format: uuid }
        tagId: { type: string, format: uuid, nullable: true }
        categoryId: { type: string, format: uuid, nullable: true }

    BulkDocumentActionResultEntry:
      type: object
      required: [id, success]
      properties:
        id: { type: string, format: uuid }
        success: { type: boolean }
        error: { type: string }

    BulkDocumentActionResult:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items: { $ref: "#/components/schemas/BulkDocumentActionResultEntry" }

    ActivityEntry:
      type: object
      required: [id, action, entityType, entityId, actor, target, metadata, createdAt]
      properties:
        id: { type: string }
        action: { type: string }
        entityType: { type: string }
        entityId: { type: string }
        actor:
          nullable: true
          type: object
          required: [id, displayName]
          properties:
            id: { type: string, format: uuid }
            displayName: { type: string }
        target:
          nullable: true
          type: object
          required: [title]
          properties:
            title: { type: string }
        metadata:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }

    ActivityPage:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ActivityEntry" }
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }

    StudyCollectionSummary:
      type: object
      required: [id, title, description, kind, visibility, isOfficial, itemCount, completedCount, progressPercent, followerCount, isFollowing, popularityScore, tagIds, createdAt, updatedAt, likeCount, isLiked, ratingCount, ratingAverage, viewCount, commentCount]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        kind: { type: string, enum: [collection, exam_prep, revision, semester, learning_path] }
        visibility: { type: string, enum: [private, public] }
        courseId: { type: string, format: uuid, nullable: true }
        categoryId: { type: string, format: uuid, nullable: true }
        examName: { type: string, nullable: true }
        semester: { type: string, enum: [fall, spring, summer], nullable: true }
        academicYear: { type: integer, nullable: true }
        tagIds: { type: array, items: { type: string, format: uuid } }
        isOfficial: { type: boolean }
        examDate: { type: string, format: date-time }
        itemCount: { type: integer }
        completedCount: { type: integer }
        progressPercent: { type: integer }
        followerCount: { type: integer }
        isFollowing: { type: boolean }
        popularityScore: { type: integer }
        likeCount: { type: integer }
        isLiked: { type: boolean }
        ratingCount: { type: integer }
        ratingAverage: { type: number }
        myRating: { type: integer, nullable: true }
        viewCount: { type: integer }
        commentCount: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        hiddenAt: { type: string, format: date-time, nullable: true }
        hiddenReason: { type: string, nullable: true }
    StudyCollectionItem:
      type: object
      required: [document, position]
      properties:
