        note: { type: string }
        position: { type: integer }
        progress: { type: string, enum: [reviewing, completed] }
    StudyCollectionDetail:
      allOf:
        - $ref: "#/components/schemas/StudyCollectionSummary"
        - type: object
          required: [items, uniqueViewCount]
          properties:
            items:
              type: array
              items: { $ref: "#/components/schemas/StudyCollectionItem" }
            uniqueViewCount: { type: integer }
    StudyCollectionComment:
      type: object
      required: [id, collectionId, author, body, createdAt, updatedAt, editable]
      properties:
        id: { type: string, format: uuid }
        collectionId: { type: string, format: uuid }
        author:
          type: object
          required: [id, displayName]
          properties:
            id: { type: string, format: uuid }
            displayName: { type: string }
        body: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        editable: { type: boolean }
    CreateCollectionRequest:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1 }
        description: { type: string }
        kind: { type: string, enum: [collection, exam_prep, revision, semester, learning_path] }
        courseId: { type: string, format: uuid }
        categoryId: { type: string, format: uuid }
        examName: { type: string }
        semester: { type: string, enum: [fall, spring, summer] }
        academicYear: { type: integer }
        tagIds:
          type: array
          items: { type: string, format: uuid }
        visibility: { type: string, enum: [private, public] }
        examDate: { type: string, format: date-time }
        documentIds:
          type: array
          items: { type: string, format: uuid }
    UpdateCollectionRequest:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        kind: { type: string, enum: [collection, exam_prep, revision, semester, learning_path] }
        visibility: { type: string, enum: [private, public] }
        categoryId: { type: string, format: uuid, nullable: true }
        examName: { type: string, nullable: true }
        semester: { type: string, enum: [fall, spring, summer], nullable: true }
        academicYear: { type: integer, nullable: true }
        tagIds:
          type: array
          items: { type: string, format: uuid }
        examDate: { type: string, format: date-time }
    AddCollectionItemRequest:
      type: object
      required: [documentId]
      properties:
        documentId: { type: string, format: uuid }
