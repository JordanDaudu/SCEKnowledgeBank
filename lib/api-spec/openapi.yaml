        "200":
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UserSummary" }

  /documents/pending-review:
    get:
      operationId: listPendingReviewDocuments
      tags: [documents]
      summary: Review queue — pending documents the caller can act on
      description: >-
        Admins see every doc in `pending_review`. Lecturers see only
        pending docs in courses they teach. Anyone else gets 403.
        Ordered oldest-submission first (FIFO drain).
      parameters:
        - { in: query, name: page, schema: { type: integer, minimum: 1, default: 1 } }
        - { in: query, name: pageSize, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
      responses:
        "200":
          description: Pending review page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DocumentPage" }
        "401": { description: Not authenticated, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "403": { description: Not a reviewer, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "404": { description: Review workflow disabled, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }

  /documents/{id}/submit-for-review:
    post:
      operationId: submitDocumentForReview
      tags: [documents]
      summary: Move a draft/rejected document into `pending_review`
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "400": { description: Invalid transition, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "401": { description: Not authenticated, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "403": { description: Not allowed, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "404": { description: Not found / review disabled, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }

  /documents/{id}/approve:
    post:
      operationId: approveDocument
      tags: [documents]
      summary: Approve a document currently in `pending_review`
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Updated document
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Document" }
        "400": { description: Invalid transition, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "401": { description: Not authenticated, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "403": { description: Not a reviewer, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }
        "404": { description: Not found / review disabled, content: { application/json: { schema: { $ref: "#/components/schemas/ApiError" } } } }

