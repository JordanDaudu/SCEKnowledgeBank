    SetItemNoteRequest:
      type: object
      required: [note]
      properties:
        note: { type: string, nullable: true }
    ReorderCollectionRequest:
      type: object
      required: [documentIds]
      properties:
        documentIds:
          type: array
          items: { type: string, format: uuid }
    SetProgressRequest:
      type: object
      required: [status]
      properties:
